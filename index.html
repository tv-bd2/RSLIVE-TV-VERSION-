<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RS Live TV</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

<div class="logo">
RS LIVE <span>TV</span>
</div>

<div class="top-controls">

<input
type="text"
id="channelSearch"
placeholder="চ্যানেল খুঁজুন..."
>

<button id="favBtn">⭐</button>

</div>

</header>

<div class="category-bar">

<button class="active" onclick="filterCategory('All',this)">All</button>
<button onclick="filterCategory('Sports',this)">Sports</button>
<button onclick="filterCategory('Bangladesh',this)">Bangladesh</button>
<button onclick="filterCategory('Movies',this)">Movies</button>
<button onclick="filterCategory('Music',this)">Music</button>

</div>

<div class="main-layout">

<div class="player-section">

<iframe
id="tv-player-iframe"
src="channel.html"
allowfullscreen>
</iframe>

<div class="banner-slider">
🔥 RS LIVE TV Premium IPTV
</div>

</div>

<div class="sidebar">

<ul id="channel-container"></ul>

</div>

</div>

<script src="playlist.js"></script>
<script src="script.js"></script>

</body>
</html>
