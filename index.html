<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DRBZH98TKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DRBZH98TKH');
    </script>

    <title>RS Live TV</title>

    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style>
        body {
            background: #000;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .tv-view .embed-responsive {
            border: 1px solid #222;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
        }
        iframe {
            border: 0 !important;
            display: block;
            width: 100%;
            height: 100%;
        }
        .marquee-container {
            background: #121212;
            color: #ffffff;
            padding: 8px 0;
            display: flex;
            align-items: center;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        .notice-label {
            background: #ff4444;
            color: #fff;
            padding: 2px 10px;
            margin-left: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            flex-shrink: 0;
        }
        .footer-premium {
            background: #0a0a0a;
            padding: 20px 0 30px 0;
            text-align: center;
        }
        
        /* নতুন ক্যাটাগরি বাটন এবং রিমোট ফোকাস স্টাইল */
        .category-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .category-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .category-btn.active, .category-btn:hover {
            background: #ff4444;
            border-color: #ff4444;
        }
        .thumbnail-slider li a {
            display: block;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 3px;
            transition: all 0.2s ease;
            outline: none;
        }
        /* রিমোট কন্ট্রোল দিয়ে ফোকাস করলে বা মাউস হোভার করলে এই হাইলাইটটি দেখাবে */
        .thumbnail-slider li a:focus, .thumbnail-slider li a.remote-focus {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            transform: scale(1.03);
        }
        .channel-name {
            display: block;
            color: #fff;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <span class="notice-label">NOTICE</span>
        <marquee direction="left" scrollamount="4" style="font-size: 13px;">
            আমাদের RS LIVE TV অ্যাপ ও ওয়েবসাইটে আপনাকে স্বাগতম! যেকোনো চ্যানেল দেখতে নিচের লোগোতে ক্লিক করুন।
        </marquee>
    </div>

    <div class="container-fluid tv-area">
        <div class="row">
            <div class="col-md-9 tv-view">
                <div class="embed-responsive embed-responsive-16by9" style="height: 520px;">
                    <iframe name="player" src="channel.html" allowfullscreen></iframe>
                </div>
            </div>

            <div class="col-md-3">
                <div class="category-container" id="category-box">
                    <button class="category-btn active" onclick="filterCategory('All')">All</button>
                    <button class="category-btn" onclick="filterCategory('Sports')">Sports</button>
                    <button class="category-btn" onclick="filterCategory('News')">News</button>
                    <button class="category-btn" onclick="filterCategory('Entertainment')">Entertainment</button>
                </div>

                <div class="channel-list">
                    <ul class="thumbnail-slider" id="channel-container">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-premium">
        <div class="container">
            <div class="tg-card" style="margin-bottom: 20px;">
                <h5 style="color:#fff; margin-bottom:5px; font-size:16px;">সাপোর্ট প্রয়োজন?</h5>
                <p style="color:#777; font-size:11px; margin-bottom:5px;">আপডেট ও চ্যানেল রিকোয়েস্টের জন্য আমাদের টেলিগ্রাম গ্রুপে যোগ দিন।</p>
                <a href="https://t.me/rslivetv" target="_blank" class="btn btn-danger btn-sm">JOIN TELEGRAM</a>
            </div>
            <div class="copyright" style="color: #666; font-size: 12px;">
                © 2026 RS LIVE TV | All Rights Reserved
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
