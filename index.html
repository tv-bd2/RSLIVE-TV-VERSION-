    <title>RS Live TV</title>

    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">

    <style>
        body {
            background: #000;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .tv-view .embed-responsive {
            border: 1px solid #222;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
        }
        iframe {
            border: 0 !important;
            display: block;
            width: 100%;
            height: 100%;
        }
        .marquee-box {
            background: #111;
            color: #fff;
            padding: 8px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 14px;
        }
        .tg-card {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #222;
        }
        .telegram-btn {
            display: inline-block;
            background: #0088cc;
            color: #fff !important;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 5px;
            font-size: 13px;
        }
        .ad-box {
            margin-top: 15px;
            text-align: center;
        }
        .copyright {
            color: #555;
            font-size: 11px;
            margin-top: 15px;
            text-align: center;
        }
    </style>

<body>

    <div class="container tv-area">
        <div class="row">
            <div class="col-md-8 tv-view">
                <div class="embed-responsive embed-responsive-16by9" style="height: 450px;">
                    <iframe id="player" name="player" src="channel.html" allowfullscreen></iframe>
                </div>

                <div class="player-controls">
                    <button id="prev-btn" class="control-btn">⏮ Previous</button>
                    <button id="next-btn" class="control-btn">Next ⏭</button>
                </div>

                <div class="marquee-box">
                    <marquee scrollamount="4">RS LIVE TV-তে আপনাকে স্বাগতম! যেকোনো সমস্যায় আমাদের টেলিগ্রাম গ্রুপে জানান।</marquee>
                </div>
            </div>

            <div class="col-md-4 channel-list">
                <ul class="thumbnail-slider" id="channel-container">
                    </ul>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center" style="margin-top: 30px; padding-bottom: 20px;">
            <div class="tg-card">
                <h5 style="color:#fff; margin-bottom:5px; font-size:16px;">সাপোর্ট প্রয়োজন?</h5>
                <p style="color:#777; font-size:11px; margin-bottom:5px;">আপডেট ও চ্যানেল রিকোয়েস্টের জন্য আমাদের টেলিগ্রাম গ্রুপে যোগ দিন।</p>
                <a href="https://t.me/rslivetv" target="_blank" class="telegram-btn">JOIN TELEGRAM</a>
            </div>

            <div class="ad-box">
                <script type="text/javascript">
                    atOptions = {

                        'format' : 'iframe',

                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/774c0e371455f6476668178b5faae5ab/invoke.js"></script>
            </div>

            <div class="copyright">
                © 2026 RS LIVE TV | All Rights Reserved
