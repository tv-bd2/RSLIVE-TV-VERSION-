    <title>RS Live TV</title>

    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style>
        body {
            background: #000;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .tv-view .embed-responsive {
            border: 1px solid #222;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
        }
        iframe {
            border: 0 !important;
            display: block;
            width: 100%;
            height: 100%;
        }
        .marquee-container {
            background: #121212;
            color: #ffffff;
            padding: 8px 0;
            display: flex;
            align-items: center;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        .notice-label {
            background: #ff4444;
            color: #fff;
            padding: 2px 10px;
            margin-left: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            flex-shrink: 0;
        }
        
        /* ক্যাটাগরি বক্স ডিজাইন */
        .category-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .category-container::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .category-btn.active, .category-btn:hover {
            background: #ff4444;
            color: #fff;
            border-color: #ff4444;
        }
        
        /* চ্যানেল লিস্ট কন্টেইনার (মোবাইলে ২ কলাম গ্রিড করার জন্য) */
        .thumbnail-slider {
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* মোবাইলে পাশাপাশি ২টি করে আসবে */
            gap: 12px;
        }

        /* কম্পিউটার বা বড় স্ক্রিনের জন্য ১টি কলাম (আপনার আগের ডিজাইন অনুযায়ী) */
        @media (min-width: 1200px) {
            .thumbnail-slider {
                grid-template-columns: 1fr;
            }
        }

        .thumbnail-slider li {
            list-style: none;
            margin: 0 !important;
        }

        .thumbnail-slider li a {
            display: block;
            outline: none;
            border: 2px solid transparent;
            border-radius: 6px;
            padding: 3px;
            transition: transform 0.2s;
            background: #111;
        }

        /* রিমোট কন্ট্রোল ফোকাস বা মাউস হোভার ইফেক্ট */
        .thumbnail-slider li a:focus, .thumbnail-slider li a.remote-focus, .thumbnail-slider li a:hover {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            transform: scale(1.02);
        }

        .thumbnail-slider li img {
            width: 100%;
            height: auto !important;
            border-radius: 4px;
            display: block;
        }
        
        /* লোগোর নিচের নামের পারফেক্ট সাইজ */
        .channel-title-text {
            display: block;
            color: #ffffff !important;
            font-size: 11px !important; 
            font-family: Arial, sans-serif !important;
            text-align: center;
            margin-top: 6px;
            margin-bottom: 2px;
            font-weight: normal;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <span class="notice-label">NOTICE</span>
        <marquee direction="left" scrollamount="4" style="font-size: 13px;">
            আমাদের RS LIVE TV অ্যাপ ও ওয়েবসাইটে আপনাকে স্বাগত! যেকোনো চ্যানেল দেখতে নিচের লোগোতে ক্লিক করুন।
        </marquee>
    </div>

    <div class="container-fluid tv-area">
        <div class="row">
            <div class="col-md-9 tv-view">
                <div class="embed-responsive embed-responsive-16by9" style="height: 520px;">
                    <iframe name="player" src="channel.html" allowfullscreen></iframe>
                </div>
            </div>

            <div class="col-md-3">
                <div class="category-container" id="category-box">
                    <button class="category-btn active" onclick="filterCategory('All')">All</button>
                    <button class="category-btn" onclick="filterCategory('Sports')">Sports</button>
                    <button class="category-btn" onclick="filterCategory('News')">News</button>
                    <button class="category-btn" onclick="filterCategory('Entertainment')">Entertainment</button>
                </div>

                <div class="channel-list">
                    <ul class="thumbnail-slider" id="channel-container">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-premium" style="background: #0a0a0a; padding: 20px 0 30px 0; text-align: center;">
        <div class="container">
            <div class="tg-card" style="margin-bottom: 20px;">
                <h5 style="color:#fff; margin-bottom:5px; font-size:16px;">সাপোর্ট প্রয়োজন?</h5>
                <p style="color:#777; font-size:11px; margin-bottom:5px;">আপডেট ও চ্যানেল রিকোয়েস্টের জন্য আমাদের টেলিগ্রাম গ্রুপে যোগ দিন।</p>
                <a href="https://t.me/rslivetv" target="_blank" class="btn btn-danger btn-sm" style="font-size: 12px; font-family: Arial;">JOIN TELEGRAM</a>
            </div>

            <div class="ad-box" style="margin-bottom: 15px;">
                <script type="text/javascript">
                    atOptions = {
                        'key' : '774c0e371455f6476668178b5faae5ab',

                <script type="text/javascript" src="//www.highperformanceformat.com/774c0e371455f6476668178b5faae5ab/invoke.js"></script>
            </div>

            <div class="copyright" style="color: #666; font-size: 12px; font-family: Arial;">
                © 2026 RS LIVE TV | All Rights Reserved

        </div>
    </footer>

        document.addEventListener('contextmenu', event => event.preventDefault());

</body>
