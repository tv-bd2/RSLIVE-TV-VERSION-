<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RS Live TV</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css?v=10.0" rel="stylesheet">
</head>
<body>

    <div id="intro-loader">
        <h1 class="brand-text">RS Live <span>TV</span></h1>
    </div>

    <div class="container tv-area">
        <div class="row">
            <div class="col-xs-12 col-md-10">
                <div class="search-container">
                    <input type="text" id="channelSearch" placeholder="🔍 চ্যানেল খুঁজুন..." onkeyup="filterChannels()">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xs-12 col-md-10 tv-view">
                <div class="embed-responsive embed-responsive-16by9">
                    <iframe name="player" src="channel.html"></iframe>
                </div>
            </div>
            <div class="col-xs-12 col-md-2 channel-list" id="scroll-wrapper">
                <ul class="thumbnail-slider" id="channel-container"></ul>
            </div>
        </div>
    </div>

    <script src="script.js?v=10.0"></script>
</body>
</html>
