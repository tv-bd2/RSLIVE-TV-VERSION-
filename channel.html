<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Rubel Live TV - Universal Player</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; background:#000; overflow:hidden; font-family:Arial,sans-serif; }

#player-container, #iframe-container {
    width:100%; height:100%; position: absolute; top:0; left:0;
}

#iframe-container iframe {
    width: 100%; height: 100%; border: none;
}

#loader {
    position:fixed; top:0; left:0; width:100%; height:100%; background:#000;
    display:flex; justify-content:center; align-items:center; z-index:9999; flex-direction:column;
}

.spinner {
    width:60px; height:60px; border:5px solid rgba(255,255,255,.15);
    border-top:5px solid #00c3ff; border-radius:50%; animation:spin 1s linear infinite;
}

@keyframes spin { 100%{transform:rotate(360deg);} }
#loader p { margin-top:15px; color:#fff; font-size:18px; }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Loading Stream...</p>
</div>

<div id="player-container">
    <div id="player"></div>
</div>

<div id="iframe-container" style="display:none;"></div>

<script>
// আপনার ভিডিও বা আইফ্রেম লিঙ্কটি এখানে দিন
const streamUrl = "https://bd-mc-fblive.fancode.com/mumbai/142069_english_hls_6969e83ef889269_1ta-di_h264/1080p.m3u8";

// চেক করা হচ্ছে এটা কি সরাসরি ভিডিও ফাইল নাকি আইফ্রেম লিঙ্ক
const isIframe = streamUrl.includes("playex.php") || streamUrl.includes("embed") || !streamUrl.includes(".m3u8");

if (isIframe) {
    // আইফ্রেম মোড
    const loader = document.getElementById("loader");
    const iframeContainer = document.getElementById("iframe-container");
    const playerContainer = document.getElementById("player-container");

    playerContainer.style.display = "none";
    iframeContainer.style.display = "block";
    
    iframeContainer.innerHTML = `<iframe src="${streamUrl}" allowfullscreen allow="autoplay; encrypted-media" scrolling="no"></iframe>`;
    
    // আইফ্রেম লোড হয়ে গেলে লোডার সরিয়ে দিন
    setTimeout(() => {
        loader.style.display = "none";
    }, 2000);

} else {
    // JW Player মোড (সরাসরি m3u8 লিঙ্কের জন্য)
    const player = jwplayer("player");
    player.setup({
        playlist:[{
            sources:[{ file: streamUrl, type: "hls", label: "HD" }]
        }],
        width:"100%", height:"100%", autostart:true, mute:false, stretching:"uniform", controls:true
    });

    player.on("ready", () => document.getElementById("loader").style.display="none");
    player.on("play", () => document.getElementById("loader").style.display="none");
    player.on("error", () => document.getElementById("loader").innerHTML="<p style='color:white'>Stream Failed</p>");
}
</script>

</body>
</html>
