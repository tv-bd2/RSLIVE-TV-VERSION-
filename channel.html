<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RS Live TV Player</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#player{
    width:100%;
    height:100%;
}

#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}

.spinner{
    width:50px;
    height:50px;
    border:4px solid rgba(255,255,255,.1);
    border-top:4px solid #00d2ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

#loader p{
    margin-top:15px;
    color:#fff;
    font-size:16px;
    letter-spacing:1px;
    font-family: Arial, sans-serif;
}

.jwplayer{
    height:100%!important;
    width:100%!important;
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Loading Stream...</p>
</div>

<div id="player"></div>

<script>
const player = jwplayer("player");

player.setup({
    playlist:[{
        title:"",
        sources:[{
            file:"https://srknowapp.ncare.live/srktvhlswodrm/srktv.stream/tracks-v1a1/mono.m3u8",
            type:"hls",
            label:"HD"
        }],
        image:""
    }],
    width:"100%",
    height:"100%",
    aspectratio:"16:9",
    autostart:true,
    mute:false,
    primary:"html5",
    stretching:"exactfit", /* টিভির ফুল স্ক্রিনে ফিট হওয়ার জন্য */
    controls:true
});

player.on("ready",function(){
    document.getElementById("loader").style.display="none";
});

player.on("error",function(){
    document.getElementById("loader").innerHTML="<p style='color:white'>Stream Failed</p>";
});

player.on("buffer",function(){
    document.getElementById("loader").style.display="flex";
});

player.on("play",function(){
    document.getElementById("loader").style.display="none";
});
</script>

</body>
</html>
